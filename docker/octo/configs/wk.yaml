# -----------------------------------------------------------------------------
# WuKongIM configuration for the OCTO dev stack.
# Mounted at /root/wukongim/wk.yaml inside the octo-wukongim container.
# -----------------------------------------------------------------------------

# debug | release | bench
mode: "debug"

# Require clients to present a token when connecting. Set to false for
# purely local experimentation, but keep true for any shared environment.
tokenAuthOn: true

# External addresses that WuKongIM advertises to clients.
#
# WuKongIM uses these values as-is when answering `GET /route` (called by
# the web/mobile clients at login to learn the realtime endpoint). If you
# leave `ip: 127.0.0.1` on a public deployment, every client will be
# told to connect to localhost and nothing will work.
#
# The octo-server compose file sets these at boot via viper env-binding
# (prefix `WK_`, dot → underscore):
#
#   WK_EXTERNAL_IP       ← $OCTO_EXTERNAL_IP   (external.ip)
#   WK_EXTERNAL_TCPADDR  ← $OCTO_WK_TCP_ADDR   (external.tcpAddr)
#   WK_EXTERNAL_WSADDR   ← $OCTO_WK_WS_ADDR    (external.wsAddr)
#   WK_EXTERNAL_WSSADDR  ← $OCTO_WK_WSS_ADDR   (external.wssAddr)
#
# Typical production deployment (TLS terminated at an outer nginx):
#
#   OCTO_EXTERNAL_IP=octo.example.com
#   OCTO_WK_WSS_ADDR=wss://octo.example.com/ws   # browsers always use this
#
# The YAML values below are the dev-mode fallbacks used when none of the
# WK_EXTERNAL_* env vars are set.
external:
  ip: "127.0.0.1"
  tcpAddr: ""
  wsAddr: ""
  wssAddr: ""

# Monitor / Prometheus scraping (optional).
monitor:
  on: true
  addr: "0.0.0.0:5300"

# OCTO Server consumes WuKongIM events over gRPC.
webhook:
  grpcAddr: "octo-server:6979"

# Keep the conversation module on so recent-conversation queries work.
conversation:
  on: true
